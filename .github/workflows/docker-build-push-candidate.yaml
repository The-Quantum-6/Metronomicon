name: Build and push to Docker Hub with :candidate tag

env:
  SQLX_OFFLINE: true

on:
  push:
    tags:
      - 'v*' # release tags, e.g. v1.2.3

jobs:
  # Build and push both components unconditionally
  build-push:
    name: Build & push ${{ matrix.component }}
    runs-on: ubuntu-latest
    concurrency:
      group: docker-candidate-${{ matrix.component }}
      cancel-in-progress: true
    strategy:
      fail-fast: false # A frontend failure shouldn't cancel the backend build
      matrix:
        component: [frontend, backend]
    steps:
      # 1. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 3. Cache Docker layers (per component to avoid collisions)
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache-${{ matrix.component }}
          key: ${{ runner.os }}-buildx-${{ matrix.component }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-${{ matrix.component }}-

      # 4. Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build and push the component image
      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}-${{ matrix.component }}:candidate
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}-${{ matrix.component }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.component }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.component }},mode=max