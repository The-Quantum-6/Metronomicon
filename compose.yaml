services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    build: ./frontend
    depends_on:
      - backend
    env_file:
      - .env
    restart: unless-stopped

  proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./testing.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
  
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: